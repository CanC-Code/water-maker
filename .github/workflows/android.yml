name: Water Marker Build Engine

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # We remove 'cache: gradle' for now because the 
          # gradle files are generated dynamically later.
          # You can add it back once the files are committed to the repo.

      - name: Set up Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Orchestration Scripts
        run: |
          # Ensure the scripts directory exists so the loop doesn't fail
          mkdir -p scripts
          
          # Find all python scripts in scripts/ folder, 
          # sort them numerically, and execute them.
          # If no scripts are found, it will simply skip.
          shopt -s nullglob
          for script in scripts/[0-9]*.py; do
            echo "::group::Executing $script"
            python3 "$script"
            echo "::endgroup::"
          done
          shopt -u nullglob

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: water-marker-apk
          path: app/build/outputs/apk/debug/*.apk
          # We change this to warn for the first attempt 
          # in case a script fails early.
          if-no-files-found: warn
