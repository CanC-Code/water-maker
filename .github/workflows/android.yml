name: Water Marker Build Engine

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # NEW: Prepare ImageMagick and Fix Security Policies
      - name: Install and Configure ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          # GitHub runners have a policy that sometimes restricts 'label' or 'draw'
          # This command ensures ImageMagick has full read/write permissions
          sudo sed -i 's/domain="coder" rights="none" pattern="PDF"/domain="coder" rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml
          sudo sed -i 's/domain="coder" rights="none" pattern="LABEL"/domain="coder" rights="read|write" pattern="LABEL"/' /etc/ImageMagick-6/policy.xml

      - name: Run Orchestration Scripts
        run: |
          mkdir -p scripts
          shopt -s nullglob
          # Sort numerically and execute
          for script in scripts/[0-9]*.py; do
            echo "::group::Executing $script"
            python3 "$script"
            echo "::endgroup::"
          done
          shopt -u nullglob

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: water-marker-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
